name: Build Windows Application

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Determine tag name and version
        id: meta
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            Write-Output "Triggered by tag: $tag"
            echo "TAG_NAME=$tag" >> $env:GITHUB_ENV
          } else {
            Write-Output "Triggered by branch push. Falling back to package.json version: v$version"
            echo "TAG_NAME=v$version" >> $env:GITHUB_ENV
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js production application
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Compile Electron process
        run: npm run electron:compile

      - name: Package application with Electron Builder
        run: npx electron-builder --win
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrabShack Water Quality Pro Installer
          path: dist-package/
          if-no-files-found: error

      - name: Create GitHub Release and Upload Installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            Automated production release of CrabShack Water Quality Pro (${{ env.TAG_NAME }}).
            
            This release contains the production-ready Windows Installer (`Setup.exe`).
          draft: false
          prerelease: false
          files: dist-package/CrabShack Water Quality Pro Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
