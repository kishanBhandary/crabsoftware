name: Build Windows Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js production application
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Compile Electron process
        run: npm run electron:compile

      - name: Package application with Electron Builder
        run: npx electron-builder --win
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrabShack Water Quality Pro Installer
          path: dist-package/
          if-no-files-found: error
